name: Trigger auto deployment for sologid-tech-hub

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/sologid-tech-hub-AutoDeployTrigger-5489e1b5-710b-4d5b-a491-425132b23bfc.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.SOLOGIDTECHHUB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SOLOGIDTECHHUB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SOLOGIDTECHHUB_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: caf924efb236acr.azurecr.io
          registryUsername: ${{ secrets.SOLOGIDTECHHUB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SOLOGIDTECHHUB_REGISTRY_PASSWORD }}
          containerAppName: sologid-tech-hub
          resourceGroup: Lawrence_rg_9098
          imageToBuild: caf924efb236acr.azurecr.io/sologid-tech-hub:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


